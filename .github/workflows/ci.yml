name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Daily at 04:00 UTC - exercises the HEAVY_RTEST / SKIP_RTEST gated
    # test corpora (Wycheproof ECDH, live DNS, anything else opted out
    # of the default suite) the regular jobs don't have the timeout
    # budget for.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  linux:
    name: Linux / ${{ matrix.compiler }} / ${{ matrix.buildtype }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        # PR runs build only debugoptimized to keep CI fast; master
        # pushes / scheduled / manual runs build both buildtypes.
        # Same pattern repeated across the other platform jobs.
        buildtype: ${{ fromJSON(github.event_name == 'pull_request' && '["debugoptimized"]' || '["debugoptimized","release"]') }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          # Drop the Chrome apt source baked into the GitHub Ubuntu image; its
          # mirror occasionally desyncs and fails apt-get update (we only need
          # the stock Ubuntu archive here).
          sudo rm -f /etc/apt/sources.list.d/*google*.list
          sudo apt-get update
          sudo apt-get install -y meson ninja-build
      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
        run: meson setup build --buildtype=${{ matrix.buildtype }}
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build --print-errorlogs
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-linux-${{ matrix.compiler }}-${{ matrix.buildtype }}
          path: build/meson-logs/

  linux-arm:
    name: Linux ARM / ${{ matrix.compiler }} / ${{ matrix.buildtype }}
    # Exercises the AArch64 + Linux HWCAP detection path; the macOS
    # job already covers AArch64 + Darwin sysctl.
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        buildtype: ${{ fromJSON(github.event_name == 'pull_request' && '["debugoptimized"]' || '["debugoptimized","release"]') }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          # Drop the Chrome apt source baked into the GitHub Ubuntu image; its
          # mirror occasionally desyncs and fails apt-get update (we only need
          # the stock Ubuntu archive here).
          sudo rm -f /etc/apt/sources.list.d/*google*.list
          sudo apt-get update
          sudo apt-get install -y meson ninja-build
      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
        run: meson setup build --buildtype=${{ matrix.buildtype }}
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build --print-errorlogs
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-linux-arm-${{ matrix.compiler }}-${{ matrix.buildtype }}
          path: build/meson-logs/

  macos:
    name: macOS / clang / ${{ matrix.buildtype }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        buildtype: ${{ fromJSON(github.event_name == 'pull_request' && '["debugoptimized"]' || '["debugoptimized","release"]') }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: brew install meson ninja
      - name: Configure
        run: meson setup build --buildtype=${{ matrix.buildtype }}
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build --print-errorlogs
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-macos-${{ matrix.buildtype }}
          path: build/meson-logs/

  windows:
    name: Windows / MSVC / ${{ matrix.buildtype }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        buildtype: ${{ fromJSON(github.event_name == 'pull_request' && '["debugoptimized"]' || '["debugoptimized","release"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install meson + ninja
        run: pip install meson ninja
      - name: Configure
        run: meson setup build --buildtype=${{ matrix.buildtype }}
      - name: Build
        run: meson compile -C build
      - name: Test
        # MSVC debug-optimised codegen plus CreateThread-emulated forks make
        # the ~840-test 'rlib test' target materially slower than other
        # platforms; multiplier of 6 keeps us under the 180s mark.
        run: meson test -C build --print-errorlogs --timeout-multiplier 6
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-windows-${{ matrix.buildtype }}
          path: build/meson-logs/

  windows-arm:
    name: Windows ARM / MSVC / ${{ matrix.buildtype }}
    # Exercises the AArch64 + Windows IsProcessorFeaturePresent
    # detection path and the MSVC __crc32c / arm_neon AES intrinsics.
    runs-on: windows-11-arm
    strategy:
      fail-fast: false
      matrix:
        buildtype: ${{ fromJSON(github.event_name == 'pull_request' && '["debugoptimized"]' || '["debugoptimized","release"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64
      - name: Install meson + ninja
        run: pip install meson ninja
      - name: Configure
        run: meson setup build --buildtype=${{ matrix.buildtype }}
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build --print-errorlogs --timeout-multiplier 6
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-windows-arm-${{ matrix.buildtype }}
          path: build/meson-logs/

  sanitizers:
    name: Sanitizers / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan+UBSan
            sanitize: address,undefined
            extra_args: -Dc_args=-fno-sanitize=function
          - name: TSan
            sanitize: thread
            extra_args: ''
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          # Drop the Chrome apt source baked into the GitHub Ubuntu image; its
          # mirror occasionally desyncs and fails apt-get update (we only need
          # the stock Ubuntu archive here).
          sudo rm -f /etc/apt/sources.list.d/*google*.list
          sudo apt-get update
          sudo apt-get install -y meson ninja-build clang
      - name: Configure
        env:
          CC: clang
        run: meson setup build -Db_sanitize=${{ matrix.sanitize }} -Db_lundef=false ${{ matrix.extra_args }}
      - name: Build
        run: meson compile -C build
      - name: Test
        # The 'rlib test' target runs every unit test inside a single
        # meson test entry, so meson's per-test cap (default 30s)
        # applies to the whole suite. TSan / ASan slowdown plus a slow
        # CI runner brushes that limit even though each unit test fits
        # its own RTEST budget; bump the multiplier to keep us under
        # the 120s mark.
        run: meson test -C build --print-errorlogs --timeout-multiplier 4
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-sanitizers-${{ matrix.name }}
          path: build/meson-logs/

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Doxygen
        run: |
          # Drop the Chrome apt source baked into the GitHub Ubuntu image; its
          # mirror occasionally desyncs and fails apt-get update (we only need
          # the stock Ubuntu archive here).
          sudo rm -f /etc/apt/sources.list.d/*google*.list
          sudo apt-get update
          sudo apt-get install -y doxygen
      - name: Generate documentation
        run: doxygen docs/Doxyfile
      - name: Upload PR-review artifact
        # 14-day retention for reviewers to browse a branch's output
        # without checking out and building. Kept across all events
        # (PR, master push, schedule, manual) so the artifact is
        # always there to download.
        uses: actions/upload-artifact@v7
        with:
          name: rlib-docs
          path: docs/output/html
          retention-days: 14
      - name: Upload GitHub Pages artifact
        # Pages publishes only from master pushes; PRs / scheduled
        # runs skip this step. upload-pages-artifact is a separate
        # action from upload-artifact - the pages-specific format is
        # what the deploy-pages step downstream consumes.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/output/html

  docs-deploy:
    name: Deploy docs to GitHub Pages
    needs: docs
    # Master pushes only - PRs don't deploy, scheduled cron runs
    # don't deploy. The site is regenerated entirely each time, so
    # a missed scheduled run doesn't matter.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write          # publish to the gh-pages target
      id-token: write       # OIDC for the deploy action's auth
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialise Pages deploys so two rapid master pushes don't fight
    # each other; cancel-in-progress = false lets the in-flight deploy
    # finish before the next one starts (deploys take seconds).
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  full-tests:
    name: Full test sweep
    runs-on: ubuntu-latest
    # Only on the scheduled cron and on demand. The corpus is sized for
    # ~10 minutes of wall time per run, which is fine for a nightly /
    # manual sweep but too much to put on every PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          # Drop the Chrome apt source baked into the GitHub Ubuntu image; its
          # mirror occasionally desyncs and fails apt-get update (we only need
          # the stock Ubuntu archive here).
          sudo rm -f /etc/apt/sources.list.d/*google*.list
          sudo apt-get update
          sudo apt-get install -y meson ninja-build
      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
        run: meson setup build --buildtype=debugoptimized
      - name: Build
        run: meson compile -C build
      - name: Test (--heavy)
        # --heavy / -H enables the HEAVY_RTEST_* tests (the four
        # Wycheproof ECDH curves) - but not BROKEN_RTEST_* (which
        # would fail by definition) or SKIP_RTEST_* (which are
        # environment-dependent, e.g. live DNS). The 30x timeout
        # multiplier gives meson's per-test cap room for the
        # secp521r1 sweep. Pass -H via --test-args so the flag
        # reaches the rlibtest binary; meson otherwise treats any
        # trailing positional argument as a test-name pattern.
        run: meson test -C build --print-errorlogs --timeout-multiplier 30 --test-args=-H
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlog-full-${{ matrix.compiler }}
          path: build/meson-logs/
